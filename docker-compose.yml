services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dev}
      POSTGRES_DB: card_generator
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d card_generator"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    # Use the published image, or `docker compose up --build` to build locally.
    image: ${APP_IMAGE:-card-generator:local}
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:-dev}@db:5432/card_generator
      OPENAI_API_KEY: ${OPENAI_API_KEY:?set OPENAI_API_KEY in your environment or .env}
      OPENAI_IMAGE_MODEL: ${OPENAI_IMAGE_MODEL:-gpt-image-1}
      OPENAI_CHAT_MODEL: ${OPENAI_CHAT_MODEL:-gpt-4o}
    ports:
      # Host port configurable via PORT in .env; app inside the container stays on 3000.
      - "${PORT:-3000}:3000"
    volumes:
      - storage:/app/storage

volumes:
  pgdata:
  storage:
